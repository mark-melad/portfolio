<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Intake Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --card:    #1a1d27;
      --border:  #2a2d3a;
      --text:    #f0f2f8;
      --muted:   #6b7280;
      --accent:  #6366f1;
      --green:   #22c55e;
      --yellow:  #eab308;
      --red:     #ef4444;
      --radius:  12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .brand-name span { color: var(--accent); }
    .live {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.25);
      color: var(--green);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:.3; }
    }

    /* ── Main ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* ── Primary counters ── */
    .counters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .counter-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }
    .counter-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .counter-card.cvs::before  { background: var(--accent); }
    .counter-card.sent::before { background: var(--green); }
    .counter-glow {
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      opacity: .06;
    }
    .counter-card.cvs  .counter-glow { background: var(--accent); }
    .counter-card.sent .counter-glow { background: var(--green); }
    .counter-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .counter-value {
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
    }
    .counter-card.cvs  .counter-value { color: var(--accent); }
    .counter-card.sent .counter-value { color: var(--green); }
    .counter-sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Mini stats row ── */
    .mini-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    .mini-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .mini-left { font-size: 13px; color: var(--muted); }
    .mini-val  { font-size: 24px; font-weight: 700; }
    .mini-card.pending .mini-val { color: var(--yellow); }
    .mini-card.errors  .mini-val { color: var(--red); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar-left { display: flex; align-items: center; gap: 12px; }
    .section-title {
      font-size: 15px;
      font-weight: 700;
    }
    .badge-count {
      background: rgba(99,102,241,.18);
      color: var(--accent);
      border: 1px solid rgba(99,102,241,.3);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .btn-scan {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-scan:hover   { opacity: .85; transform: translateY(-1px); }
    .btn-scan:active  { transform: translateY(0); }
    .btn-scan:disabled { opacity: .4; cursor: default; transform: none; }
    .updated {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #13151f;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 11px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1f2232; }
    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    td.num  { color: var(--muted); width: 40px; font-size: 12px; }
    td.name { font-weight: 600; }
    td.dim  { color: var(--muted); font-size: 12px; }

    /* ── Pills ── */
    .pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .pill-sent    { background:rgba(34,197,94,.15);  color:var(--green);  border:1px solid rgba(34,197,94,.3);  }
    .pill-error   { background:rgba(239,68,68,.15);  color:var(--red);    border:1px solid rgba(239,68,68,.3);  }
    .pill-pending { background:rgba(234,179,8,.15);  color:var(--yellow); border:1px solid rgba(234,179,8,.3);  }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 56px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
    .empty-text { font-size: 14px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .counters, .mini-stats { grid-template-columns: 1fr; }
      .counter-value { font-size: 40px; }
      header { padding: 14px 16px; }
      main   { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">&#128203;</div>
    <div class="brand-name">CV Intake <span>Agent</span></div>
  </div>
  <div class="live"><div class="dot"></div> Live</div>
</header>

<main>

  <!-- ── Primary counters ── -->
  <div class="counters">
    <div class="counter-card cvs">
      <div class="counter-glow"></div>
      <div class="counter-label">CVs Received</div>
      <div class="counter-value" id="cnt-total">—</div>
      <div class="counter-sub">Total applications processed</div>
    </div>
    <div class="counter-card sent">
      <div class="counter-glow"></div>
      <div class="counter-label">Emails Sent</div>
      <div class="counter-value" id="cnt-sent">—</div>
      <div class="counter-sub">Welcome emails delivered</div>
    </div>
  </div>

  <!-- ── Mini stats ── -->
  <div class="mini-stats">
    <div class="mini-card pending">
      <div class="mini-left">&#9203;&nbsp; Awaiting action</div>
      <div class="mini-val" id="cnt-pending">—</div>
    </div>
    <div class="mini-card errors">
      <div class="mini-left">&#9888;&nbsp; Errors</div>
      <div class="mini-val" id="cnt-errors">—</div>
    </div>
  </div>

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="section-title">Candidates</span>
      <span class="badge-count" id="badge-count">0</span>
    </div>
    <div class="toolbar-left">
      <span class="updated" id="updated">Updated just now</span>
      <button class="btn-scan" id="btn-scan" onclick="scanNow()">
        &#9654; Scan Now
      </button>
    </div>
  </div>

  <!-- ── Candidates table ── -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
          <th>File</th>
          <th>Status</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-icon">&#128203;</div>
      <div class="empty-text">No CVs yet &mdash; waiting for applications&hellip;</div>
    </div>
  </div>

</main>

<script>
  let lastRefresh = Date.now();

  async function refresh() {
    try {
      const [cr, sr] = await Promise.all([fetch('/candidates'), fetch('/stats')]);
      const candidates = await cr.json();
      const stats      = await sr.json();
      renderCounters(stats);
      renderTable(candidates);
      lastRefresh = Date.now();
    } catch (e) { console.error(e); }
  }

  function renderCounters(s) {
    set('cnt-total',   s.total   ?? 0);
    set('cnt-sent',    s.emailed ?? 0);
    set('cnt-pending', s.pending ?? 0);
    set('cnt-errors',  s.errors  ?? 0);
  }

  function renderTable(rows) {
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');
    document.getElementById('badge-count').textContent = rows.length;

    if (!rows.length) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td class="num">${i + 1}</td>
        <td class="name">${esc(r.name || '—')}</td>
        <td>${esc(r.email || '—')}</td>
        <td class="dim">${esc(r.phone || '—')}</td>
        <td class="dim">${esc(r.title || '—')}</td>
        <td class="dim" title="${esc(r.source_file || '')}">${esc(r.source_file || '—')}</td>
        <td>${pill(r)}</td>
        <td class="dim">${fmt(r.created_at)}</td>
      </tr>`).join('');
  }

  function pill(r) {
    if (r.email_sent === 1) return '<span class="pill pill-sent">Sent</span>';
    if (r.error)            return `<span class="pill pill-error" title="${esc(r.error)}">Error</span>`;
    return '<span class="pill pill-pending">Pending</span>';
  }

  function fmt(s) {
    if (!s) return '—';
    try {
      return new Date(s.replace(' ', 'T') + 'Z').toLocaleString(undefined, {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    } catch { return s; }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function set(id, val) { document.getElementById(id).textContent = val; }

  async function scanNow() {
    const btn = document.getElementById('btn-scan');
    btn.disabled = true;
    btn.innerHTML = '&#9203; Scanning&hellip;';
    try {
      await fetch('/scan-now', { method: 'POST' });
      await refresh();
    } catch(e) { console.error(e); }
    finally {
      btn.disabled = false;
      btn.innerHTML = '&#9654; Scan Now';
    }
  }

  setInterval(() => {
    const s = Math.floor((Date.now() - lastRefresh) / 1000);
    const el = document.getElementById('updated');
    if (s < 5)       el.textContent = 'Updated just now';
    else if (s < 60) el.textContent = `Updated ${s}s ago`;
    else             el.textContent = `Updated ${Math.floor(s/60)}m ago`;
  }, 1000);

  refresh();
  setInterval(refresh, 10000);
</script>
</body>
</html>
